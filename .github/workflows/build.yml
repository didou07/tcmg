name: Build & Release

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: Linux x86-64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends gcc make python3

      - name: Verify source tree
        run: |
          test -f tcmg-main.c   || { echo "ERROR: tcmg-main.c not found";  exit 1; }
          test -f globals.h     || { echo "ERROR: globals.h not found";     exit 1; }
          test -f webif/assets/tcmg.css || { echo "ERROR: webif/assets/tcmg.css missing"; exit 1; }
          test -f webif/assets/tcmg.js  || { echo "ERROR: webif/assets/tcmg.js missing";  exit 1; }
          test -f tools/gen_assets.py   || { echo "ERROR: tools/gen_assets.py missing";   exit 1; }
          echo "Source tree OK"

      - name: Generate webif assets
        run: python3 tools/gen_assets.py

      - name: Build (release)
        run: make RELEASE=1 -j$(nproc)

      - name: Smoke-test binary
        run: |
          file build/tcmg
          ./build/tcmg -v
          ls -lh build/tcmg

      - name: Read version
        id: ver
        run: |
          V=$(grep -oP '#\s*define\s+TCMG_VERSION\s+"\K[^"]+' globals.h || echo "dev")
          echo "version=${V}" >> "$GITHUB_OUTPUT"

      - name: Package
        run: |
          ARCHIVE="tcmg-${{ steps.ver.outputs.version }}-linux-x86_64.tar.gz"
          tar -czf "${ARCHIVE}" -C build tcmg
          sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256
          retention-days: 30

  windows:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 + MinGW-w64
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update:  false
          install: >-
            mingw-w64-x86_64-gcc
            make
            python3
            zip

      - name: Verify source tree
        shell: msys2 {0}
        run: |
          test -f tcmg-main.c || { echo "ERROR: tcmg-main.c not found"; exit 1; }
          test -f globals.h   || { echo "ERROR: globals.h not found";   exit 1; }
          test -f webif/assets/tcmg.css || { echo "ERROR: webif/assets/tcmg.css missing"; exit 1; }
          test -f webif/assets/tcmg.js  || { echo "ERROR: webif/assets/tcmg.js missing";  exit 1; }
          test -f tools/gen_assets.py   || { echo "ERROR: tools/gen_assets.py missing";   exit 1; }
          echo "Source tree OK"

      - name: Generate webif assets
        shell: msys2 {0}
        run: python3 tools/gen_assets.py

      - name: Build (release)
        shell: msys2 {0}
        run: |
          make RELEASE=1 \
               CC=x86_64-w64-mingw32-gcc \
               STRIP=strip \
               -j$(nproc)

      - name: Smoke-test
        shell: msys2 {0}
        run: |
          file build/tcmg_x64.exe
          ls -lh build/tcmg_x64.exe

      - name: Read version
        id: ver
        shell: msys2 {0}
        run: |
          V=$(grep -oP '#\s*define\s+TCMG_VERSION\s+"\K[^"]+' globals.h || echo "dev")
          echo "version=${V}" >> "$GITHUB_OUTPUT"

      - name: Package
        shell: msys2 {0}
        run: |
          ARCHIVE="tcmg-${{ steps.ver.outputs.version }}-windows-x64.zip"
          zip "${ARCHIVE}" build/tcmg_x64.exe
          sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256
          retention-days: 30

  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate signing secrets
        run: |
          missing=""
          [ -z "${{ secrets.KEYSTORE_BASE64 }}"   ] && missing="$missing KEYSTORE_BASE64"
          [ -z "${{ secrets.KEYSTORE_PASSWORD }}"  ] && missing="$missing KEYSTORE_PASSWORD"
          [ -z "${{ secrets.KEY_ALIAS }}"          ] && missing="$missing KEY_ALIAS"
          [ -z "${{ secrets.KEY_PASSWORD }}"       ] && missing="$missing KEY_PASSWORD"
          if [ -n "$missing" ]; then
            echo "ERROR: GitHub Secrets not set:$missing"
            echo "Go to: Settings → Secrets and variables → Actions"
            exit 1
          fi

      - name: Verify source tree
        run: |
          test -f tcmg-main.c                                        || { echo "ERROR: tcmg-main.c missing";        exit 1; }
          test -f android/app/src/main/jni/CMakeLists.txt            || { echo "ERROR: CMakeLists.txt missing";     exit 1; }
          test -f android/app/src/main/jni/tcmg_jni_bridge.c        || { echo "ERROR: JNI bridge missing";         exit 1; }
          test -f webif/assets/tcmg.css                              || { echo "ERROR: webif/assets/tcmg.css missing"; exit 1; }
          test -f webif/assets/tcmg.js                               || { echo "ERROR: webif/assets/tcmg.js missing";  exit 1; }
          test -f tools/gen_assets.py                                || { echo "ERROR: tools/gen_assets.py missing";   exit 1; }
          echo "Source tree OK"

      - name: Generate webif assets
        run: python3 tools/gen_assets.py

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/tcmg-key.jks

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Install NDK 27 and CMake
        run: |
          sdkmanager --install \
            "ndk;27.2.12479018" \
            "cmake;3.22.1" \
          2>&1 | grep -v "^\[=" || true

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Restore Gradle wrapper JAR
        run: |
          GRADLE_VER=$(grep distributionUrl \
            android/gradle/wrapper/gradle-wrapper.properties \
            | sed 's/.*gradle-\([0-9.]*\)-.*/\1/')
          mkdir -p android/gradle/wrapper
          curl -sSfL \
            "https://raw.githubusercontent.com/gradle/gradle/v${GRADLE_VER}/gradle/wrapper/gradle-wrapper.jar" \
            -o android/gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build signed release APK
        working-directory: android
        env:
          KEYSTORE_BASE64:   ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace \
            -Pandroid.ndkVersion=27.2.12479018

      - name: Wipe keystore from runner
        if: always()
        run: rm -f android/tcmg-key.jks

      - name: Locate release APK
        id: apks
        run: |
          APK=$(find android -name "*-release*.apk" -print -quit 2>/dev/null || true)
          [ -z "$APK" ] && { echo "ERROR: release APK not found"; exit 1; }
          echo "release_apk=${APK}" >> "$GITHUB_OUTPUT"
          ls -lh "${APK}"

      - uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: ${{ steps.apks.outputs.release_apk }}
          retention-days: 90

  release:
    name: Tag & Publish Release
    runs-on: ubuntu-latest
    needs: [ linux, windows, android ]
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version
        id: ver
        run: |
          V=$(grep -oP '#\s*define\s+TCMG_VERSION\s+"\K[^"]+' globals.h || true)
          [ -z "$V" ] && { echo "ERROR: TCMG_VERSION not found in globals.h"; exit 1; }
          echo "version=${V}" >> "$GITHUB_OUTPUT"
          echo "Version: ${V}"

      - name: Create tag
        run: |
          TAG="v${{ steps.ver.outputs.version }}"
          git tag -a "${TAG}" -m "Release ${TAG}" 2>/dev/null || echo "Tag ${TAG} already exists"
          git push origin "${TAG}" 2>/dev/null || echo "Tag already pushed"

      - uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: List release files
        run: find dist/ -type f | sort

      - uses: softprops/action-gh-release@v2
        with:
          tag_name:  v${{ steps.ver.outputs.version }}
          name:      "tcmg v${{ steps.ver.outputs.version }}"
          body: |
            ## tcmg v${{ steps.ver.outputs.version }}

            Released from commit `${{ github.sha }}`.

            ### Downloads
            | Platform     | File                              |
            |--------------|-----------------------------------|
            | Linux x86-64 | `tcmg-*-linux-x86_64.tar.gz`      |
            | Windows x64  | `tcmg-*-windows-x64.zip`          |
            | Android      | `*.apk`                           |

            SHA-256 checksums are included alongside each archive.
          files: dist/**/*
          fail_on_unmatched_files: false
